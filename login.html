<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Surgical Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b2b44 0%, #1a4d6f 50%, #2c7da0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            color: #0b2b44;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #5a6874;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f2f5;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: #0b2b44;
            color: white;
            box-shadow: 0 2px 8px rgba(11, 43, 68, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e2f3e;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.1);
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: normal;
            color: #4a627a;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }

        .forgot-link {
            color: #2c7da0;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #0b2b44;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            background: #1a4d6f;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(11, 43, 68, 0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            margin: 0 12px;
        }

        .google-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            text-decoration: none;
            color: #1e2f3e;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .google-login-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }

        .message.success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }

        .info-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #7c8b9c;
        }

        .info-text a {
            color: #2c7da0;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 28px 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>📚 Surgical Quiz</h1>
        <div class="subtitle">Sign in to sync your progress</div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('login')">Login</button>
            <button class="tab-btn" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password">
            </div>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
            </div>
            <button class="auth-btn" onclick="login()">Login →</button>
        </div>

        <!-- Register Form (hidden initially) -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create a password (min 6 characters)">
            </div>
            <button class="auth-btn" onclick="register()">Create Account →</button>
        </div>

        <div id="message" class="message"></div>

        <div class="divider">
            <span>or</span>
        </div>

        <!-- Google Sign In Button (uses JavaScript to capture return URL) -->
        <div class="google-login-btn" id="googleLoginBtn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign in with Google
        </div>

        <div class="info-text">
            <p>By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
            <p style="margin-top: 12px;">
                <a href="index.html">← Continue as Guest</a>
            </p>
        </div>
    </div>

    <script>
        // Helper: get the return URL (the page user was on before login)
        function getReturnUrl() {
            // If there's a redirect parameter in the URL (e.g., from login page itself), use it
            const urlParams = new URLSearchParams(window.location.search);
            let returnUrl = urlParams.get('redirect');
            if (returnUrl) {
                return decodeURIComponent(returnUrl);
            }
            // Otherwise, use the HTTP referrer (if it's from our site)
            const referrer = document.referrer;
            if (referrer && referrer.includes(window.location.hostname)) {
                try {
                    const url = new URL(referrer);
                    return url.pathname + url.search;
                } catch(e) {}
            }
            // Default fallback
            return '/index.html';
        }

        const returnUrl = getReturnUrl();

        // Save return URL for later use (after login)
        localStorage.setItem('redirectAfterLogin', returnUrl);

        // Show tab
        function showTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
            clearMessage();
        }

        function clearMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message';
            msgDiv.style.display = 'none';
            msgDiv.innerHTML = '';
        }

        function showMessage(text, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = text;
            msgDiv.className = `message ${isError ? 'error' : 'success'}`;
            msgDiv.style.display = 'block';
        }

        // Login with email/password
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showMessage('Please enter email and password', true);
                return;
            }

            showMessage('Logging in...', false);

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'login', 
                        email, 
                        password,
                        remember: remember
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('session_token', result.token);
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('username', result.username);
                    if (remember) {
                        localStorage.setItem('remember_me', 'true');
                    } else {
                        localStorage.removeItem('remember_me');
                    }
                    showMessage('✅ Login successful! Redirecting...', false);
                    setTimeout(() => {
                        window.location.href = returnUrl;
                    }, 800);
                } else {
                    showMessage(result.error || 'Login failed', true);
                }
            } catch(error) {
                console.error(error);
                showMessage('Network error. Please try again.', true);
            }
        }

        // Register new account
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showMessage('Please fill all fields', true);
                return;
            }
            if (username.length < 3) {
                showMessage('Username must be at least 3 characters', true);
                return;
            }
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', true);
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address', true);
                return;
            }

            showMessage('Creating account...', false);

            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', username, email, password })
                });
                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('session_token', result.token);
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('username', result.username);
                    showMessage('✅ Account created! Redirecting...', false);
                    setTimeout(() => {
                        window.location.href = returnUrl;
                    }, 800);
                } else {
                    showMessage(result.error || 'Registration failed', true);
                }
            } catch(error) {
                console.error(error);
                showMessage('Network error. Please try again.', true);
            }
        }

        // Google Sign In – pass return URL as a query parameter
        document.getElementById('googleLoginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            // Encode the return URL and redirect to google-auth.php
            const encodedReturn = encodeURIComponent(returnUrl);
            window.location.href = `api/google-auth.php?returnUrl=${encodedReturn}`;
        });

        // Forgot password – placeholder
        document.getElementById('forgotPasswordLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            alert('Please contact support to reset your password, or login with Google.');
        });

        // Enter key support
        document.getElementById('loginEmail')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
        document.getElementById('loginPassword')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
        document.getElementById('regUsername')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
        document.getElementById('regEmail')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
        document.getElementById('regPassword')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });

        // Auto-focus email field
        document.getElementById('loginEmail').focus();

        // If user previously checked "Remember me", pre-check the checkbox
        if (localStorage.getItem('remember_me') === 'true') {
            const cb = document.getElementById('rememberMe');
            if (cb) cb.checked = true;
        }
    </script>
</body>
</html>
