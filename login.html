<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Login | MasterPass</title>
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MasterPass">
    <meta name="application-name" content="MasterPass">
    <meta name="theme-color" content="#2c5f2d">
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0b2b44 0%, #1a4d6f 50%, #2c7da0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 2rem;
            color: #0b2b44;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #5a6874;
            font-size: 0.9rem;
        }
        
        .tab-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e9edf2;
        }
        
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #7c8b9c;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .tab-btn.active {
            color: #2c5f2d;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #2c5f2d;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1e293b;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2c5f2d;
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #2c5f2d;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            background: #3a7a3b;
            transform: scale(1.02);
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #5a6874;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .back-link:hover {
            color: #2c5f2d;
        }
        
        .install-prompt {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e9edf2;
            display: none;
        }
        
        .install-btn {
            background: #e67e22;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .install-btn:hover {
            background: #f39c12;
            transform: scale(1.02);
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📚 MasterPass</h1>
            <p>Surgical & Medical Board Review</p>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" id="loginTab">Login</button>
            <button class="tab-btn" id="registerTab">Register</button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button class="btn-submit" id="loginBtn">Login →</button>
        </div>
        
        <!-- Register Form (hidden by default) -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Choose a password (min 6 characters)">
            </div>
            <button class="btn-submit" id="registerBtn">Create Account →</button>
        </div>
        
        <div id="message" class="message"></div>
        <a href="index.html" class="back-link">← Back to Library</a>
        
        <div id="installPrompt" class="install-prompt">
            <button id="installBtn" class="install-btn">📲 Install App</button>
        </div>
    </div>

    <script>
        // ============================================
        // API CONFIGURATION - Point to InfinityFree
        // ============================================
        const API_BASE = 'https://relaxreading.rf.gd/api/';
        const API_AUTH = API_BASE + 'auth.php';
        
        let deferredPrompt = null;
        
        // ============================================
        // PWA INSTALLATION
        // ============================================
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').style.display = 'block';
        });
        
        document.getElementById('installBtn')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User ${outcome} the installation`);
                deferredPrompt = null;
                document.getElementById('installPrompt').style.display = 'none';
            }
        });
        
        // ============================================
        // TAB SWITCHING
        // ============================================
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            clearMessage();
        });
        
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
            clearMessage();
        });
        
        function clearMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'none';
            msgDiv.className = 'message';
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
        }
        
        // ============================================
        // LOGIN FUNCTION
        // ============================================
        async function login(email, password) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            
            try {
                const response = await fetch(API_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'login', 
                        email: email, 
                        password: password 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('session_token', result.token);
                    localStorage.setItem('username', result.username);
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        const redirect = localStorage.getItem('redirectAfterLogin') || 'index.html';
                        localStorage.removeItem('redirectAfterLogin');
                        window.location.href = redirect;
                    }, 1000);
                } else {
                    showMessage(result.error || 'Login failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Login →';
                }
            } catch(e) {
                console.error('Login error:', e);
                showMessage('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Login →';
            }
        }
        
        // ============================================
        // REGISTER FUNCTION
        // ============================================
        async function register(name, email, password) {
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            
            try {
                const response = await fetch(API_AUTH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'register', 
                        name: name,
                        email: email, 
                        password: password 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('session_token', result.token);
                    localStorage.setItem('username', result.username);
                    showMessage('Account created! Redirecting...', 'success');
                    setTimeout(() => {
                        const redirect = localStorage.getItem('redirectAfterLogin') || 'index.html';
                        localStorage.removeItem('redirectAfterLogin');
                        window.location.href = redirect;
                    }, 1000);
                } else {
                    showMessage(result.error || 'Registration failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Create Account →';
                }
            } catch(e) {
                console.error('Register error:', e);
                showMessage('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please enter both email and password.', 'error');
                return;
            }
            
            login(email, password);
        });
        
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!name || !email || !password) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            
            register(name, email, password);
        });
        
        // Allow Enter key to submit
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    if (loginForm.style.display !== 'none') {
                        document.getElementById('loginBtn').click();
                    } else {
                        document.getElementById('registerBtn').click();
                    }
                }
            });
        });
        
        // Check if already logged in
        const token = localStorage.getItem('session_token');
        if (token) {
            // Verify token is still valid
            fetch(API_AUTH, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'verify', token: token })
            })
            .then(r => r.json())
            .then(result => {
                if (result.success) {
                    // Already logged in, redirect to library
                    const redirect = localStorage.getItem('redirectAfterLogin') || 'index.html';
                    localStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirect;
                }
            })
            .catch(e => console.log('Token verification failed:', e));
        }
        
        // ============================================
        // SERVICE WORKER REGISTRATION
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
